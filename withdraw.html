<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw</title>
</head>

<body>

<h1>💸 Withdraw Money</h1>

<p>Enter amount:</p>

<input type="number" id="amount" placeholder="Enter coins">

<br><br>

<button onclick="requestWithdraw()">Request Withdraw</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCA-CqdOOvUwcCx-LFfgsD44cQRCeI-G1U",
authDomain: "data-seller-c30db.firebaseapp.com",
projectId: "data-seller-c30db",
storageBucket: "data-seller-c30db.firebasestorage.app",
messagingSenderId: "33011133656",
appId: "1:33011133656:web:cc11efa04fb5ea21ec3bad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const phone = localStorage.getItem("phone");

if(!phone){
window.location.href = "login.html";
}

window.requestWithdraw = async function(){

let amount = document.getElementById("amount").value;

if(!amount || amount <= 0){
alert("Enter valid amount");
return;
}

await addDoc(collection(db,"withdraws"),{
phone: phone,
amount: Number(amount),
status: "pending"
});

document.getElementById("status").innerHTML = "Request Sent 🚀";
};

</script>

</body>
</html>
