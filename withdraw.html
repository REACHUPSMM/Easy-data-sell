<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw</title>
</head>

<body>

<h1>💸 Withdraw Money</h1>

<p>Available Coins: <span id="coinText">0</span></p>

<hr>

<h3>Choose Method</h3>

<select id="method">
<option value="upi">UPI ID</option>
<option value="bank">Bank Account</option>
</select>

<br><br>

<input type="text" id="upi" placeholder="Enter UPI ID">

<input type="text" id="bank" placeholder="Enter Bank Account No" style="display:none;">

<br><br>

<input type="number" id="amount" placeholder="Enter Amount">

<br><br>

<button onclick="requestWithdraw()">Request Withdraw</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
updateDoc,
addDoc,
collection
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCA-CqdOOvUwcCx-LFfgsD44cQRCeI-G1U",
authDomain: "data-seller-c30db.firebaseapp.com",
projectId: "data-seller-c30db",
storageBucket: "data-seller-c30db.firebasestorage.app",
messagingSenderId: "33011133656",
appId: "1:33011133656:web:cc11efa04fb5ea21ec3bad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const phone = localStorage.getItem("phone");

if(!phone){
window.location.href = "login.html";
}

const userRef = doc(db,"users",phone);

let coins = 0;

// LOAD USER
async function loadUser(){
const snap = await getDoc(userRef);
const data = snap.data();

coins = data.coins || 0;

document.getElementById("coinText").innerHTML = coins.toFixed(1);
}

loadUser();


// METHOD SWITCH
document.getElementById("method").addEventListener("change", function(){

let val = this.value;

if(val === "upi"){
document.getElementById("upi").style.display = "block";
document.getElementById("bank").style.display = "none";
}else{
document.getElementById("upi").style.display = "none";
document.getElementById("bank").style.display = "block";
}

});


// REQUEST WITHDRAW
window.requestWithdraw = async function(){

let amount = Number(document.getElementById("amount").value);
let method = document.getElementById("method").value;
let upi = document.getElementById("upi").value;
let bank = document.getElementById("bank").value;

if(!amount || amount <= 0){
alert("Enter valid amount");
return;
}

if(amount > coins){
alert("Not enough balance");
return;
}

// SAVE REQUEST
await addDoc(collection(db,"withdraws"),{
phone: phone,
amount: amount,
method: method,
upi: upi,
bank: bank,
status: "pending"
});

document.getElementById("status").innerHTML =
"Withdraw Request Sent 🚀";
};

</script>

</body>
</html>
