<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Withdraw
</title>

<link rel="stylesheet"
href="style.css">

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCA-CqdOOvUwcCx-LFfgsD44cQRCeI-G1U",

authDomain: "data-seller-c30db.firebaseapp.com",

projectId: "data-seller-c30db",

storageBucket: "data-seller-c30db.firebasestorage.app",

messagingSenderId: "33011133656",

appId: "1:33011133656:web:cc11efa04fb5ea21ec3bad"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.withdrawNow =
async function(){

const phone =
localStorage.getItem(
"phone"
);

const userRef =
doc(db,"users",phone);

const snap =
await getDoc(userRef);

const data =
snap.data();

const coins =
data.coins || 0;

if(coins < 25000){

alert(
"Minimum withdrawal is ₹250"
);

return;

}

alert(
"Withdrawal request submitted 🚀"
);

}

</script>

</head>

<body>

<div class="top-bar">

<div class="back-btn"
onclick="history.back()">
← Back
</div>

<a href="menu.html"
class="menu-btn">
☰ Menu
</a>

</div>

<div class="center-box">

<div class="logo-circle">
💸
</div>

<h1>
Withdraw
</h1>

<p>
1000 Coins = ₹10
</p>

<p>
Minimum Withdrawal ₹250
</p>

<input
type="text"
placeholder="Enter UPI ID">

<button
class="main-btn"
onclick="withdrawNow()">

WITHDRAW NOW

</button>

</div>

</body>
</html>
