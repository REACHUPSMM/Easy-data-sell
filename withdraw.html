<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdraw</title>

  <link rel="stylesheet" href="style.css">

  <script type="module">

    import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getFirestore,
      doc,
      getDoc,
      updateDoc,
      collection,
      addDoc
    }
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCA-CqdOOvUwcCx-LFfgsD44cQRCeI-G1U",
      authDomain: "data-seller-c30db.firebaseapp.com",
      projectId: "data-seller-c30db",
      storageBucket: "data-seller-c30db.firebasestorage.app",
      messagingSenderId: "33011133656",
      appId: "1:33011133656:web:cc11efa04fb5ea21ec3bad"
    };

    const app =
    initializeApp(firebaseConfig);

    const db =
    getFirestore(app);

    const phone =
    localStorage.getItem("phone");

    if(!phone){

      window.location.href =
      "login.html";

    }

    const userRef =
    doc(db,"users",phone);

    async function loadCoins(){

      const snap =
      await getDoc(userRef);

      const data =
      snap.data();

      document.getElementById(
        "coinDisplay"
      ).innerHTML =
      "🪙 " +
      (data.coins || 0).toFixed(1);

    }

    loadCoins();

    window.requestWithdraw =
    async function(){

      let upi =
      document.getElementById(
        "upi"
      ).value;

      let amount =
      Number(
        document.getElementById(
          "amount"
        ).value
      );

      if(upi === ""){

        alert(
          "Please enter UPI ID"
        );

        return;

      }

      if(amount < 250){

        alert(
          "Minimum withdrawal is ₹250"
        );

        return;

      }

      const snap =
      await getDoc(userRef);

      const data =
      snap.data();

      let coins =
      data.coins || 0;

      let requiredCoins =
      amount * 100;

      if(coins < requiredCoins){

        alert(
          "Insufficient Coins ❌\n\nYou need " +
          requiredCoins +
          " coins to withdraw ₹" +
          amount
        );

        return;

      }

      let newCoins =
      coins - requiredCoins;

      await updateDoc(userRef,{
        coins:newCoins
      });

      await addDoc(
        collection(
          db,
          "withdrawals"
        ),
        {
          phone:phone,
          upi:upi,
          amount:amount,
          status:"pending",
          created:
          new Date().toISOString()
        }
      );

      document.getElementById(
        "coinDisplay"
      ).innerHTML =
      "🪙 " +
      newCoins.toFixed(1);

      alert(
        "Withdrawal Request Submitted 🚀"
      );

    }

  </script>

</head>

<body>

<div class="top-bar">

  <div class="coin-box" id="coinDisplay">
    🪙 0
  </div>

</div>

<div class="withdraw-card">

  <h1>
    💸 Withdraw Money
  </h1>

  <p class="withdraw-text">
    1000 Coins = ₹10
  </p>

  <input
    type="text"
    id="upi"
    placeholder="Enter UPI ID"
  >

  <input
    type="number"
    id="amount"
    placeholder="Enter Amount"
  >

  <button
    class="main-btn"
    onclick="requestWithdraw()"
  >
    REQUEST WITHDRAWAL
  </button>

</div>

<div class="bottom-nav">

  <a href="withdraw.html">
    💸
    <span>Withdraw</span>
  </a>

  <a href="dashboard.html">
    🏠
    <span>Home</span>
  </a>

  <a href="premium.html">
    👑
    <span>Premium</span>
  </a>

</div>

</body>
</html>
