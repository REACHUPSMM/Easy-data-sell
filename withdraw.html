<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Withdraw</title>
</head>

<body>

<h1>💸 Withdraw</h1>

Coins: <span id="coinText">0</span>

<hr>

<select id="method" onchange="toggle()">
<option value="upi">UPI</option>
<option value="bank">Bank</option>
</select>

<br><br>

<!-- UPI -->
<div id="upiBox">
<input id="upi" placeholder="Enter UPI ID">
</div>

<!-- BANK -->
<div id="bankBox" style="display:none;">
<input id="acc" placeholder="Account Number"><br><br>
<input id="ifsc" placeholder="IFSC Code"><br><br>
<input id="name" placeholder="Account Holder Name">
</div>

<br>

<input id="amount" type="number" placeholder="Amount">

<br><br>

<button onclick="request()">Request Withdraw</button>

<p id="status"></p>

<hr>

<h2>📜 History</h2>
<div id="history"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
addDoc,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyCA-CqdOOvUwcCx-LFfgsD44cQRCeI-G1U",
authDomain: "data-seller-c30db.firebaseapp.com",
projectId: "data-seller-c30db"
});

const db = getFirestore(app);
const phone = localStorage.getItem("phone");

const userRef = doc(db,"users",phone);

let coins=0;

async function load(){
const snap = await getDoc(userRef);
coins = snap.data().coins || 0;
document.getElementById("coinText").innerText = coins;
loadHistory();
}

load();

window.toggle = function(){
let m = document.getElementById("method").value;

document.getElementById("upiBox").style.display = m==="upi"?"block":"none";
document.getElementById("bankBox").style.display = m==="bank"?"block":"none";
};

window.request = async function(){

let amount = Number(document.getElementById("amount").value);
let method = document.getElementById("method").value;

if(amount<=0 || amount>coins){
alert("Invalid");
return;
}

let data = {
phone,
amount,
method,
status:"pending",
time:Date.now()
};

if(method==="upi"){
data.upi = document.getElementById("upi").value;
}else{
data.acc = document.getElementById("acc").value;
data.ifsc = document.getElementById("ifsc").value;
data.name = document.getElementById("name").value;
}

await addDoc(collection(db,"withdraws"),data);

document.getElementById("status").innerText="Sent 🚀";

loadHistory();
};

// HISTORY
async function loadHistory(){

const q = query(collection(db,"withdraws"),where("phone","==",phone));
const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
let x=d.data();
html+=`<p>${x.amount} - ${x.status}</p>`;
});

document.getElementById("history").innerHTML=html;
}

window.loadHistory = loadHistory;

</script>

</body>

</html>
