<!DOCTYPE html>
<html>

<head>
<title>Admin</title>
</head>

<body>

<h1>🔥 Admin Panel</h1>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCA-CqdOOvUvcCx-LFfgsD44cQRCeI-G1U",
authDomain:"data-seller-c30db.firebaseapp.com",
projectId:"data-seller-c30db"
});

const db = getFirestore(app);

// LOAD WITHDRAW
async function load(){

const snap = await getDocs(collection(db,"withdraws"));

let html="";

snap.forEach(d=>{
let x=d.data();

html+=`
<div>
<p>${x.phone}</p>
<p>${x.amount}</p>
<p>${x.status}</p>

<button onclick="approve('${d.id}','${x.phone}',${x.amount})">Approve</button>
</div>
`;
});

document.getElementById("list").innerHTML=html;
}

load();

// APPROVE + DEDUCT
window.approve = async function(id,phone,amount){

const userRef = doc(db,"users",phone);
const snap = await getDoc(userRef);

let coins = snap.data().coins || 0;

if(coins < amount){
alert("Not enough balance");
return;
}

// deduct coins
await updateDoc(userRef,{
coins: coins - amount
});

// update withdraw
await updateDoc(doc(db,"withdraws",id),{
status:"approved"
});

load();
};

</script>

</body>

</html>
