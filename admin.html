<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { font-family: Arial; padding:20px; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:10px; }
button { margin:5px; }
</style>
</head>

<body>

<h1>🔥 ADMIN PANEL</h1>

<input id="phone" placeholder="User Phone"><br><br>
<input id="value" placeholder="Coins / Amount"><br><br>

<button onclick="addCoins()">Add Coins</button>
<button onclick="setCoins()">Set Coins</button>
<button onclick="blockUser()">Block</button>
<button onclick="unblockUser()">Unblock</button>

<hr>

<h2>Withdraw Requests</h2>
<div id="withdrawList">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
doc,
updateDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCA-CqdOOvUwcCx-LFfgsD44cQRCeI-G1U",
authDomain: "data-seller-c30db.firebaseapp.com",
projectId: "data-seller-c30db",
storageBucket: "data-seller-c30db.firebasestorage.app",
messagingSenderId: "33011133656",
appId: "1:33011133656:web:cc11efa04fb5ea21ec3bad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= USERS CONTROL =================

window.addCoins = async function(){
let phone = document.getElementById("phone").value;
let value = Number(document.getElementById("value").value);

await updateDoc(doc(db,"users",phone),{
coins: value
});

alert("Coins Added");
};

window.setCoins = async function(){
let phone = document.getElementById("phone").value;
let value = Number(document.getElementById("value").value);

await updateDoc(doc(db,"users",phone),{
coins: value
});

alert("Coins Set");
};

window.blockUser = async function(){
let phone = document.getElementById("phone").value;

await updateDoc(doc(db,"users",phone),{
blocked: true
});

alert("User Blocked");
};

window.unblockUser = async function(){
let phone = document.getElementById("phone").value;

await updateDoc(doc(db,"users",phone),{
blocked: false
});

alert("User Unblocked");
};

// ================= WITHDRAW =================

async function loadWithdraws(){

const snap = await getDocs(collection(db,"withdraws"));

let html = "";

snap.forEach(docu => {

let d = docu.data();

html += `
<div class="card">
<p>📱 ${d.phone}</p>
<p>💰 ${d.amount}</p>
<p>📌 ${d.status}</p>

<button onclick="approve('${docu.id}')">Approve</button>
<button onclick="reject('${docu.id}')">Reject</button>
</div>
`;
});

document.getElementById("withdrawList").innerHTML = html;
}

loadWithdraws();

window.approve = async function(id){
await updateDoc(doc(db,"withdraws",id),{
status:"approved"
});
loadWithdraws();
};

window.reject = async function(id){
await updateDoc(doc(db,"withdraws",id),{
status:"rejected"
});
loadWithdraws();
};

</script>

</body>
</html>
