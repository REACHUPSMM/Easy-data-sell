<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT"
});

const db = getFirestore(app);

/* AUTH */
const phone = localStorage.getItem("phone");
const role = localStorage.getItem("role");

if(!phone || localStorage.getItem("logged") !== "yes"){
location.href = "login.html";
}

const ref = doc(db,"users",phone);

/* STATE */
let coins = 0;
let run = false;
let cooldown = false;

/* TIMERS */
let earnTimer = null;
let mainTimer = null;
let cdTimer = null;

/* SETTINGS */
const RATE = 0.1;
const EARN_TIME = 120;
const COOLDOWN_TIME = 60;

/* ------------------ UI UPDATE ------------------ */
function updateCoinsUI(){
document.getElementById("coins").innerText = coins.toFixed(1);
document.getElementById("topCoins").innerText = coins.toFixed(1);
}

/* ------------------ LOAD USER ------------------ */
async function loadUser(){
const snap = await getDoc(ref);

coins = snap.data().coins || 0;

updateCoinsUI(); // ✅ FIX
document.getElementById("userType").innerText =
role === "premium" ? "👑 Premium User" : "👤 Normal User";
}
loadUser();

/* ------------------ START EARN ------------------ */
window.startEarn = function(){

if(run || cooldown){
alert("Wait...");
return;
}

run = true;
clearAll();

let time = EARN_TIME;

earnTimer = setInterval(async ()=>{

coins += RATE;

updateCoinsUI(); // ✅ FIX

await updateDoc(ref,{ coins });

},1000);

mainTimer = setInterval(()=>{

time--;
document.getElementById("timer").innerText = time + "s";

if(time <= 0){
stopAll();
}

},1000);

};

/* ------------------ STOP ------------------ */
window.stopEarn = function(){
stopAll();
};

function stopAll(){
run = false;
clearAll();
startCooldown();
}

/* ------------------ CLEAR ------------------ */
function clearAll(){
clearInterval(earnTimer);
clearInterval(mainTimer);
earnTimer = null;
mainTimer = null;
}

/* ------------------ COOLDOWN ------------------ */
function startCooldown(){

cooldown = true;

let t = COOLDOWN_TIME;

clearInterval(cdTimer);

cdTimer = setInterval(()=>{

t--;
document.getElementById("timer").innerText = "Cooldown " + t + "s";

if(t <= 0){
clearInterval(cdTimer);
cooldown = false;
document.getElementById("timer").innerText = "Ready";
}

},1000);
}

/* ------------------ COPY REF ------------------ */
window.copyRef = function(){
navigator.clipboard.writeText(phone);
alert("Referral code copied 🚀");
};

</script>

</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
<div onclick="history.back()">← Back</div>

<div class="top-coins">
🪙 <span id="topCoins">0</span>
</div>

<a href="menu.html" style="color:white;text-decoration:none;">☰ Menu</a>
</div>

<!-- MAIN -->
<div class="center-box">

<h2>Dashboard</h2>

<p id="userType">Loading...</p>

<div class="coin-card">
🪙 <span id="coins">0</span>
</div>

<div id="timer">Ready</div>

<button onclick="startEarn()" class="main-btn">START EARNING</button>
<button onclick="stopEarn()" class="stop-btn">STOP</button>

</div>

<!-- REF -->
<div class="center-box">

<h3>Refer & Earn</h3>

<div id="refCode"></div>

<button onclick="copyRef()" class="main-btn">COPY CODE</button>

</div>

<script>
document.getElementById("refCode").innerText = phone;
</script>

</body>
</html>
