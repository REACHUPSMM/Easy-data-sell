<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCA-CqdOOvUwcCx-LFfgsD44cQRCeI-G1U",
authDomain: "data-seller-c30db.firebaseapp.com",
projectId: "data-seller-c30db",
storageBucket: "data-seller-c30db.firebasestorage.app",
messagingSenderId: "33011133656",
appId: "1:33011133656:web:cc11efa04fb5ea21ec3bad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const phone = localStorage.getItem("phone");

if(!phone){
window.location.href = "login.html";
}

const userRef = doc(db,"users",phone);

let coins = 0;
let userLoaded = false;

// TIMER SETTINGS
let workTime = 2 * 60;
let cooldownTime = 1 * 60;

let timerRunning = false;
let timerInterval;

// ================= LOAD USER =================
async function loadUser(){

const snap = await getDoc(userRef);

if(!snap.exists()){
alert("User not found");
return;
}

const data = snap.data();

// BLOCK CHECK
if(data.blocked){
alert("Account Blocked by Admin");
window.location.href = "login.html";
return;
}

coins = data.coins ?? 0;
document.getElementById("coinText").innerHTML = coins.toFixed(1);

if(data.premium){
document.getElementById("premiumStatus").innerHTML = "👑 Premium Active";
}

userLoaded = true;
}

loadUser();


// ================= TIMER START =================
window.startTimerCycle = function(){

if(!userLoaded){
alert("Loading user data... please wait");
return;
}

if(timerRunning) return;
timerRunning = true;

runWorkTimer();
};


// ================= WORK TIMER =================
function runWorkTimer(){

let time = workTime;
let display = document.getElementById("timer");

clearInterval(timerInterval);

timerInterval = setInterval(()=>{

let m = Math.floor(time / 60);
let s = time % 60;

display.innerHTML = `WORK: ${m}:${s < 10 ? "0" : ""}${s}`;

// COINS EARN
coins += 0.1;
document.getElementById("coinText").innerHTML = coins.toFixed(1);

// SAVE (NO await -> avoids lag + freeze)
updateDoc(userRef,{
coins: coins
});

time--;

if(time < 0){
clearInterval(timerInterval);
runCooldownTimer();
}

},1000);
}


// ================= COOLDOWN TIMER =================
function runCooldownTimer(){

let time = cooldownTime;
let display = document.getElementById("timer");

timerInterval = setInterval(()=>{

let m = Math.floor(time / 60);
let s = time % 60;

display.innerHTML = `COOLDOWN: ${m}:${s < 10 ? "0" : ""}${s}`;

time--;

if(time < 0){
clearInterval(timerInterval);
timerRunning = false;
display.innerHTML = "READY";
}

},1000);
}


// ================= STOP =================
window.stopSelling = function(){
clearInterval(timerInterval);
timerRunning = false;
document.getElementById("timer").innerHTML = "STOPPED";
};


// ================= COPY REF =================
window.copyReferral = function(){
navigator.clipboard.writeText(phone);
alert("Referral copied 🚀");
};

</script>

</head>

<body>

<div class="top-bar">
<div class="back-btn" onclick="history.back()">← Back</div>
<a href="menu.html" class="menu-btn">☰ Menu</a>
</div>

<div class="dashboard-top">

<div>
<h1 class="welcome-title">Welcome 👋</h1>
<p class="welcome-sub">Start earning now</p>
</div>

<div class="coin-card">
🪙 <span id="coinText">0</span>
</div>

</div>

<div class="main-card">

<div class="live-box">🔥 LIVE EARNING</div>

<div id="premiumStatus" class="status-text">Normal User</div>

<div id="timer">READY</div>

<button class="main-btn" onclick="startTimerCycle()">
START SELLING
</button>

<br><br>

<button class="stop-btn" onclick="stopSelling()">
STOP SELLING
</button>

</div>

<div class="referral-card">

<h2>🎁 Referral Rewards</h2>

<p>Invite friends and earn bonus coins</p>

<div class="ref-code">
<script>document.write(phone);</script>
</div>

<button onclick="copyReferral()">COPY REFERRAL</button>

</div>

</body>
</html>
